name: Release
on:
  push:
    branches: [main]
    paths:
      - src/mcp_openrouter/__init__.py
      - .github/workflows/release.yml
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
      - run: uv sync
      - run: |
          exit_code=0
          uv run --with pytest pytest || exit_code=$?
          if [ $exit_code -eq 5 ]; then
            echo "No tests collected - skipping"
            exit 0
          fi
          exit $exit_code

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version
        id: check-version
        shell: bash
        run: |
          VERSION=$(python -c "
          import tomllib
          import re

          with open('pyproject.toml', 'rb') as f:
              config = tomllib.load(f)

          project = config.get('project', {})

          if 'version' in project:
              print(project['version'])
          elif 'version' in project.get('dynamic', []):
              hatch_config = config.get('tool', {}).get('hatch', {}).get('version', {})
              version_path = hatch_config.get('path')
              if version_path:
                  with open(version_path) as vf:
                      content = vf.read()
                      match = re.search(r'__version__\\s*=\\s*[\"\\']([^\"\\']+)[\"\\']', content)
                      if match:
                          print(match.group(1))
                      else:
                          raise ValueError(f'Could not find __version__ in {version_path}')
              else:
                  raise ValueError('Dynamic version specified but no hatch.version.path found')
          else:
              raise ValueError('No version found in pyproject.toml')
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup uv
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: astral-sh/setup-uv@v7
        with:
          cache: true
      - name: Build package
        if: steps.check-version.outputs.tag_exists == 'false'
        run: uv build
      - name: Create GitHub release
        if: steps.check-version.outputs.tag_exists == 'false'
        run: gh release create "${{ steps.check-version.outputs.tag }}" --title "${{ steps.check-version.outputs.tag }}" --generate-notes dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI
        if: steps.check-version.outputs.tag_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
