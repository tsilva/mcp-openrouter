name: Release
on:
  push:
    branches: [main]
    paths: [pyproject.toml]
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  test:
    uses: tsilva/.github/.github/workflows/test.yml@main

  publish:
    needs: [test]
    permissions:
      contents: write
      id-token: write
    uses: tsilva/.github/.github/workflows/publish-pypi.yml@main
