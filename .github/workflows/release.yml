name: Release
on:
  push:
    branches: [main]
    paths:
      - src/mcp_openrouter/__init__.py
      - .github/workflows/release.yml
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  test:
    uses: tsilva/.github/.github/workflows/test.yml@main

  publish:
    needs: [test]
    permissions:
      contents: write
      id-token: write
    secrets: inherit
    uses: tsilva/.github/.github/workflows/publish-pypi.yml@main
